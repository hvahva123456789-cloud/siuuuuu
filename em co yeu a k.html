<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em có yêu anh không?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .question {
            font-size: 2.5em;
            color: #e91e63;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: heartbeat 2s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }

        .counter {
            font-size: 1.2em;
            color: #ff6b6b;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .buttons {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            min-width: 140px;
            transition: transform 0.35s ease, box-shadow 0.35s ease, left 0.45s ease, top 0.45s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-no {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            
        }

        .btn-yes {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            
        }

        .swap-mode {
            width: 360px;
            margin: 0 auto;
        }

        .swap-mode .btn {
            position: absolute;
        }

        .btn-jump {
            animation: jumpSwap 0.45s ease;
        }

        @keyframes jumpSwap {
            0% { transform: translateY(0) scale(1); }
            35% { transform: translateY(-18px) scale(1.05); }
            100% { transform: translateY(0) scale(1); }
        }

        .success {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            padding: 30px 60px;
            border-radius: 20px;
            font-size: 1.8em;
            font-weight: bold;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            opacity: 0;
            animation: popup 0.5s ease forwards;
            z-index: 1000;
            text-align: center;
        }

        @keyframes popup {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .hide {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="question">Em có yêu anh không? 😘</div>
        <div class="counter" id="counter">Đã nói "Không" <span id="count">0</span> lần 😤</div>
        <div class="buttons" id="buttons">
            <button class="btn btn-no" id="btnNo">Không 😢</button>
            <button class="btn btn-yes" id="btnYes">Có ❤️</button>
        </div>
    </div>

    <div class="success hide" id="successMsg">
        Cuối cùng cũng chịu thừa nhận rồi!
        <br><br>
         Đồ chyspp piiiiiiii 🥰
    </div>

    <script>
        const btnNo = document.getElementById("btnNo");
        const btnYes = document.getElementById("btnYes");
        const buttons = document.getElementById("buttons");
        const container = document.getElementById("container");
        const successMsg = document.getElementById("successMsg");
        const counter = document.getElementById("counter");
        const countSpan = document.getElementById("count");

        let noCount = 0;
        let isAnimating = false;
        let swapped = false;

        function setButtonPositions() {
            buttons.classList.add("swap-mode");

            if (swapped) {
                btnNo.style.left = "calc(50% + 10px)";
                btnYes.style.left = "calc(50% - 150px)";
            } else {
                btnNo.style.left = "calc(50% - 150px)";
                btnYes.style.left = "calc(50% + 10px)";
            }

            btnNo.style.top = "0";
            btnYes.style.top = "0";
        }

        function playJump() {
            btnNo.classList.remove("btn-jump");
            btnYes.classList.remove("btn-jump");

            void btnNo.offsetWidth;

            btnNo.classList.add("btn-jump");
            btnYes.classList.add("btn-jump");
        }

        window.addEventListener("load", setButtonPositions);
        window.addEventListener("resize", setButtonPositions);

        btnNo.addEventListener("click", function() {
            if (isAnimating) return;

            isAnimating = true;
            noCount += 1;
            countSpan.textContent = noCount;

            swapped = !swapped;
            playJump();
            setButtonPositions();

            setTimeout(() => {
                btnNo.classList.remove("btn-jump");
                btnYes.classList.remove("btn-jump");
                isAnimating = false;
            }, 450);
        });

        btnYes.addEventListener("click", function() {
            container.classList.add("hide");
            counter.style.display = "none";
            successMsg.classList.remove("hide");

            setTimeout(() => {
                location.reload();
            }, 4000);
        });
    </script>
</body>
</html>
